<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orvalia Studio — Agência de Branding e Sites em Indaiatuba</title>
    <meta name="description" content="A Orvalia Studio é a agência líder em branding estratégico e criação de sites em Indaiatuba e RMC. Transformamos marcas locais com design de elite e alta performance digital." />
    <meta name="keywords" content="agencia branding indaiatuba, criação sites indaiatuba, marketing digital indaiatuba, identidade visual campinas, branding rmc, SEO local indaiatuba, GEO optimization" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#05070A]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@id": "https://orvalia.com.br/#localbusiness",
      "@type": "DesignAgency",
      "name": "Orvalia Studio",
      "description": "Agência especializada em branding estratégico, criação de sites de alta performance e design para empresas em Indaiatuba, Campinas e região.",
      "url": "https://orvalia.com.br",
      "telephone": "+55 11 97895-9567",
      "priceRange": "$$$",
      "areaServed": [
        { "@type": "City", "name": "Indaiatuba" },
        { "@type": "City", "name": "Campinas" },
        { "@type": "City", "name": "Salto" },
        { "@type": "City", "name": "Itu" },
        { "@type": "State", "name": "São Paulo" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Indaiatuba",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços Digitais",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Criação de Sites em Indaiatuba",
              "description": "Desenvolvimento de websites de alta performance, rápidos e focados em conversão."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Branding e Identidade Visual",
              "description": "Construção de marcas fortes e posicionamento de elite para empresas."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SEO - Otimização para Buscas",
              "description": "Estratégias para colocar seu negócio no topo do Google em Indaiatuba e região."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Landing Pages de Alta Conversão",
              "description": "Páginas de vendas otimizadas para tráfego pago e captação de leads."
            }
          }
        ]
      }
    }
    </script>
  </body>
</html>
