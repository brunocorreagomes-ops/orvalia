<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branding em Indaiatuba | Orvalia Studio</title>
    <meta name="description" content="Estúdio especializado em branding e identidade visual em Indaiatuba. Criamos marcas estratégicas que se posicionam no digital." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#05070A]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "DesignAgency",
      "name": "Orvalia Studio",
      "description": "Branding e construção de marca em Indaiatuba",
      "url": "https://orvalia.com.br",
      "areaServed": "Indaiatuba",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Indaiatuba",
        "addressRegion": "SP",
        "addressCountry": "BR"
